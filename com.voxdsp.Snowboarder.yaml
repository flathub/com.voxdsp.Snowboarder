app-id: com.voxdsp.Snowboarder
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: snowboarder
rename-icon: snowboarder
rename-desktop-file: snowboarder.desktop
rename-appdata-file: snowboarder.appdata.xml
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
modules:
  - name: snowboarder
    buildsystem: simple
    build-commands:
      - cc Snowboarder/main.c -I inc -lSDL2 -lGLESv2 -lEGL -Ofast -lm -o snowboarder
      - install -Dm 0755 snowboarder -t ${FLATPAK_DEST}/bin
      - install -Dm 0644 Snowboarder/flatpak/snowboarder.desktop ${FLATPAK_DEST}/share/applications/snowboarder.desktop
      - install -Dm 0644 Snowboarder/flatpak/snowboarder.appdata.xml ${FLATPAK_DEST}/share/metainfo/snowboarder.appdata.xml
      - install -Dm 0644 Snowboarder/flatpak/snowboarder.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/snowboarder.png
    sources:
      - type: git
        url: https://github.com/mrbid/NotABug-Mirror.git
        commit: 9783867161be015ec0f46c9ec19c758716d566f0
      - type: patch
        path: fix-missing-esAux2h-file.patch
